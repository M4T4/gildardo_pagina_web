    about_page:
      title: "I am Gildardo Lucero, and I help people develop mental strength and resilience to face life's challenges."

      paragraph_1: "From a young age, I was passionate about sports, both individual and team disciplines. I was always fascinated by how some athletes manage pressure in decisive moments: when everything comes down to a single play, when character is needed to win—or even to accept defeat."

      paragraph_2: "Over time, in my clinical work, I began noticing something that deeply impacted me. Some young people between the ages of 17 and 20 came to therapy feeling emotionally defeated after difficult experiences in sports."

      paragraph_3: "Many of them also began developing addiction-related problems, whether involving substances or behaviors such as gambling."

      paragraph_4: "This sparked a professional interest in understanding addictions more deeply and how pressure, frustration, and loss of direction can affect a person's life."

      paragraph_5: "Throughout my education and clinical experience, I have come to understand two worlds that often intersect despite appearing very different: sports and addiction."

      paragraph_6: "Today, my work focuses on helping people regain direction, strengthen their character, and develop the emotional skills needed to remain resilient in the face of pressure, setbacks, relapses, and life's challenges."

      psychologist_name: "Psychologist Gildardo Lucero Sainz"

      paragraph_7: "I work with adolescents and adults who want to regain emotional stability, improve their relationships, and learn to manage anxiety and depression."

      paragraph_8: "I have more than 12 years of clinical experience, as well as diplomas and national certifications in the treatment of addictions, anxiety disorders, and depression."

      paragraph_9: "I work under the cognitive-behavioral approach, an evidence-based model focused on creating real, practical, and sustainable change in people's lives."

      paragraph_10: "My goal is for you to begin noticing positive changes from the very first sessions through clear tools and a therapeutic process focused on results."

      paragraph_11: "From our first meeting, I strive to create a space of trust, openness, and collaboration where you can feel heard, understood, and supported throughout your process of change."
