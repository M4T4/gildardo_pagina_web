    about:
      title: "Our Team"
      name: "Therapist Alejandra Sainz Huerta"
      quote: "25 years helping families heal and strengthen their relationships"
      paragraph_1: "For more than two decades, she has worked with children, adolescents, couples, and families through processes of growth, reconciliation, and emotional well-being, providing a safe space to strengthen communication, heal emotional wounds, and build healthier relationships."
      paragraph_2: "With a Master's degree in Family Therapy from CIDH and more than 25 years of experience, I have had the privilege of supporting hundreds of families, couples, and individuals through some of the most difficult moments of their lives. I have witnessed firsthand how relationship crises can impact emotional health, how addictions can fracture family bonds, and how loss and grief challenge us to rebuild ourselves."
      paragraph_3: "My professional journey began in rehabilitation centers in Rosarito (Rescatando Almas), where I learned that recovery is not only an individual process but one that involves the entire family system. I have also shared this knowledge as a professor at UNIDEP and through workshops in schools covering topics such as bullying prevention, sexual education, and inclusion."
      paragraph_4: "Today, through my private practice, I support families, couples, and individuals seeking to restore emotional balance. I work especially with couples in crisis, helping them rebuild communication and trust, and with families affected by addiction, where the path to recovery is a collective journey."
      paragraph_5: "My approach is systemic and deeply human: I see the invisible connections that sustain problems, but also the strengths that can transform a family."

      paragraph_6: "My commitment is simple yet profound: to create safe spaces where people can heal, reconnect, and build emotionally healthy lives, one conversation at a time."

      paragraph_7: "Specialized training in grief counseling, palliative care, and child abuse prevention allows me to provide support during some of life's most delicate moments."

      paragraph_8: "Within every family, there is a story of love worth reclaiming."

