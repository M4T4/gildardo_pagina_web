    services_pages:
      intensive_workshop_page:
        title: "Talleres Intensivos"

        paragraph_1: "Los talleres intensivos son espacios de aprendizaje y entrenamiento psicológico diseñados para desarrollar habilidades emocionales y de bienestar en un formato práctico y dinámico."

        paragraph_2: "Durante estos talleres se trabajan herramientas basadas en psicología clínica y terapia cognitivo-conductual que permiten a los participantes comprender mejor sus emociones, mejorar su toma de decisiones y fortalecer su bienestar personal."

        topics_title: "Temas que se abordan"

        topic_1: "Manejo del estrés y la ansiedad"
        topic_2: "Regulación emocional"
        topic_3: "Autoestima y seguridad personal"
        topic_4: "Manejo de conflictos"
        topic_5: "Desarrollo personal"

        modality_title: "Modalidad:"
        modality_description: "Sesiones grupales intensivas con ejercicios prácticos y herramientas aplicables a la vida diaria."

        objective_title: "Objetivo:"
        objective_description: "Que los participantes se lleven estrategias concretas que puedan implementar inmediatamente en su vida personal o profesional."
      students_program_page:
        title: "Programa para estudiantes"

        paragraph_1: "Este programa está diseñado para estudiantes de secundaria y preparatoria que enfrentan presión académica, estrés escolar, problemas emocionales o dificultades en su desarrollo personal."

        paragraph_2: "Actualmente muchos jóvenes experimentan altos niveles de ansiedad, falta de motivación o dificultades para manejar la presión académica y social."

        paragraph_3: "Este programa les ayuda a desarrollar habilidades psicológicas fundamentales para su bienestar y rendimiento."

        areas_title: "El programa trabaja áreas como:"

        area_1: "Manejo de ansiedad y estrés académico"
        area_2: "Desarrollo de autoestima"
        area_3: "Regulación emocional"
        area_4: "Presión social y toma de decisiones"
        area_5: "Hábitos saludables y disciplina personal"

        objective_title: "Objetivo:"
        objective_description: "Ayudar a los estudiantes a desarrollar estabilidad emocional, confianza en sí mismos y habilidades que les permitan afrontar los retos de esta etapa."
      addiction_program_page:
        title: "Programa Libre de Adicciones (Intensivo 6 semanas)"

        paragraph_1: "El programa libre de adicciones está diseñado para personas que desean recuperar el control de su vida y superar conductas adictivas."

        paragraph_2: "Las adicciones no solo afectan la salud física y emocional, sino también las relaciones personales, el desempeño laboral y la calidad de vida."

        areas_title: "Este programa ofrece un acompañamiento psicológico estructurado enfocado en:"

        area_1: "Identificación de detonantes emocionales"
        area_2: "Manejo de impulsos"
        area_3: "Desarrollo de autocontrol"
        area_4: "Prevención de recaídas"
        area_5: "Reconstrucción de hábitos saludables"

        paragraph_3: "Se utilizan herramientas basadas en terapia cognitivo conductual y psicología clínica para ayudar a las personas a comprender su conducta y desarrollar estrategias sostenibles de cambio."

        objective_title: "Objetivo:"
        objective_description: "Ayudar a las personas a recuperar estabilidad emocional, fortalecer su autocontrol y construir una vida libre de adicciones."