          content: "Estoy eternamente agradecida por el apoyo que brindó a mi hijo adolescente. Su diagnóstico fue acertado y el tratamiento muy efectivo. Le dio de alta con las herramientas necesarias para mantener su estabilidad emocional. Antes habíamos acudido a otros psicólogos sin obtener buenos resultados. Lo recomiendo ampliamente y, sin duda, volveríamos con él si fuera necesario. ¡Gracias!"