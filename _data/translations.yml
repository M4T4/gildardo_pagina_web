    about:
      title: "Nuestro equipo de trabajo"
      name: "Alejandra Sainz Huerta"
      quote: "25 años acompañando a familias a sanar y fortalecer sus vínculos"
      paragraph_1: "A lo largo de más de dos décadas, ha acompañado a niños, adolescentes, parejas y familias en procesos de crecimiento, reconciliación y bienestar emocional, brindando un espacio seguro para fortalecer la comunicación, sanar heridas y construir vínculos más saludables."
      paragraph_2: "Con mi maestría en terapia familiar del CIDH y más de 25 años de experiencia, he tenido el privilegio de acompañar a cientos de familias, parejas e individuos en sus momentos más difíciles. He visto de cerca cómo las crisis de pareja pueden desgastar la salud emocional, cómo las adicciones fracturan los lazos familiares, y cómo la pérdida y el duelo nos desafían a reconstruirnos."
      paragraph_3: "Mi trabajo comenzó en centros de rehabilitación en Rosarito (Rescatando Almas), donde aprendí que la recuperación no es solo individual, sino que involucra todo el sistema familiar. También he compartido este conocimiento como docente en UNIDEP y dando talleres en escuelas sobre bullying, educación sexual e inclusión."
      paragraph_4: "Hoy, desde mi consultorio privado, acompaño a familias, parejas e individuos que buscan recuperar su equilibrio emocional. Trabajo especialmente con parejas en crisis, ayudándolas a reconstruir la comunicación y confianza, y con familias afectadas por adicciones, donde el camino hacia la recuperación es colectivo."
