    about_page:
      title: "Soy Gildardo Lucero, y ayudo a las personas a desarrollar fortaleza mental y constancia para enfrentar los retos de la vida."

      paragraph_1: "Desde joven me apasionaron los deportes, tanto individuales como de equipo. Siempre me llamó la atención cómo algunos jugadores logran manejar la presión en momentos decisivos: cuando todo se define en una jugada, cuando se necesita carácter para ganar… o incluso para aceptar una derrota."

      paragraph_2: "Con el tiempo, en mi trabajo clínico, comencé a notar algo que me impactó profundamente. Algunos jóvenes entre los 17 y 20 años llegaban a consulta emocionalmente derrotados después de experiencias difíciles en el deporte."

      paragraph_3: "Muchos de ellos, además, comenzaban a desarrollar problemas de adicción, ya fuera a sustancias o a conductas como el juego."

      paragraph_4: "Esto despertó en mí una inquietud profesional: entender a profundidad el fenómeno de las adicciones y cómo la presión, la frustración y la pérdida de rumbo pueden afectar la vida de una persona."

      paragraph_5: "A lo largo de mi formación y experiencia clínica he podido comprender dos mundos que, aunque parecen distintos, muchas veces se conectan: el deporte y las adicciones."

      paragraph_6: "Hoy mi trabajo se enfoca en ayudar a las personas a recuperar su dirección, fortalecer su carácter y desarrollar las habilidades emocionales necesarias para mantenerse firmes ante la presión, las recaídas y los desafíos de la vida."

      psychologist_name: "Psicólogo Gildardo Lucero Sainz"

      paragraph_7: "Acompaño a adolescentes y adultos que buscan recuperar su estabilidad emocional, mejorar sus relaciones y aprender a manejar la ansiedad y depresión."

      paragraph_8: "Cuento con más de 12 años de experiencia clínica, así como con diplomado y certificaciones a nivel nacional en el tratamiento de adicciones y trastornos de ansiedad y depresión."

      paragraph_9: "Trabajo bajo el enfoque cognitivo-conductual, un modelo basado en evidencia científica que se enfoca en generar cambios reales, prácticos y sostenibles en la vida de las personas."

      paragraph_10: "Mi objetivo es que puedas comenzar a notar cambios desde las primeras sesiones, a través de herramientas claras y un trabajo terapéutico enfocado en resultados."

      paragraph_11: "Desde el primer encuentro busco crear un espacio de confianza, apertura y trabajo colaborativo, donde puedas sentirte escuchado, comprendido y acompañado durante tu proceso de cambio."
